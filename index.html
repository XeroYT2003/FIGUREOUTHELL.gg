<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIGUREOUTHELL | Identity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="enter-screen" onclick="startExperience()">
        <div class="enter-content">
            <span class="enter-text">[ OTWÓRZ RANĘ ]</span>
        </div>
    </div>

    <div class="background-container">
        <video id="main-media" loop playsinline muted>
            <source src="video/d4vd Afterlife.mp4" type="video/mp4">
        </video>
        <div class="vignette"></div>
        <div class="scanlines"></div>
        <div class="grain"></div>
    </div>

    <main class="profile-card" id="main-content">
        <div class="status-badge" id="discord-status-text">OFFLINE</div>
        <div class="rose-icon"><i class="fa-solid fa-seedling"></i></div>

        <div class="avatar-wrapper">
            <div class="avatar-glow"></div>
            <img src="" class="avatar" id="discord-avatar" alt="Avatar">
            <div class="status-dot" id="status-dot"></div>
        </div>
        
        <h1 id="discord-name" class="main-title">FIGUREOUTHELL</h1>
        <p class="subtitle">🤍 🩸 🥀</p>

        <div class="activity-card">
            <div class="activity-icon">
                <img src="" id="activity-img" class="notif-img" alt="">
                <i class="fa-brands fa-discord" id="default-icon"></i>
            </div>
            <div class="activity-info">
                <b id="activity-user">FIGUREOUTHELL</b>
                <span id="activity-detail">Cisza...</span>
            </div>
        </div>

        <div class="music-widget">
            <div class="track-info">
                <div class="disk-container">
                    <img id="album-art" src="imgs/3000x3000bbd4vdafterlife.jpg" class="rotating"> </div>
                <div class="track-text">
                    <span id="track-title">Loading track...</span>
                    <div class="time-info">
                        <span id="current-time">00:00</span>
                        <div class="progress-container">
                            <input type="range" id="progress-bar" value="0" min="0" max="100">
                        </div>
                        <span id="duration">00:00</span>
                    </div>
                </div>
            </div>

            <div class="player-controls">
                <button id="play-btn"><i class="fa-solid fa-play"></i></button>
                <div class="volume-group">
                    <i class="fa-solid fa-volume-high" id="volume-icon"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.15">
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
